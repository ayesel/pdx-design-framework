# Annotations Template
#
# Design annotations for a screen — numbered callouts
# for every design decision that isn't self-evident.

template:
  name: Design Annotations
  artifact_type: annotations
  output_file: "_bmad-output/pdx-artifacts/handoff-annotations-{scope-name}.md"

structure:
  header:
    - artifact: "Design Annotations"
    - screen: "{scope-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Relay (Design Ops)"

  sections:
    - name: "Screen Overview"
      description: >
        Screen name, purpose, where it sits in the flow,
        link to Figma frame and related artifacts.

    - name: "Spacing Annotations"
      description: >
        | # | Element | Property | Token | Value | Notes |
        Document all spacing that a developer wouldn't intuit:
        margins, padding, gaps, alignment offsets.

    - name: "Typography Annotations"
      description: >
        | # | Element | Token | Family | Size | Weight | Line Height | Letter Spacing |
        Document every text style on the screen with token references.

    - name: "Color Annotations"
      description: >
        | # | Element | Property | Token | Value | Notes |
        Document background colors, text colors, border colors, shadow colors.

    - name: "Interaction Annotations"
      description: >
        | # | Element | Trigger | Response | Duration | Easing | Notes |
        Document hover effects, click responses, transitions, drag behavior.

    - name: "Responsive Annotations"
      description: >
        | # | Element | Desktop | Tablet | Mobile | Notes |
        Document how elements change at each breakpoint.

    - name: "Accessibility Annotations"
      description: >
        | # | Element | ARIA Role | ARIA Attributes | Tab Order | Screen Reader Text |
        Document accessibility requirements for each interactive element.

    - name: "Component Annotations"
      description: >
        | # | Element | Component | Variant | Props | Notes |
        Map screen elements to component library components with specific props.

    - name: "Content Annotations"
      description: >
        | # | Element | Copy | Source (Echo) | Max Length | Truncation |
        Document final copy with character limits and overflow behavior.

    - name: "Next Steps"
      description: >
        Typically: Jira stories referencing these annotations,
        or component specs for custom elements identified.
