# A/B Test Plan Template
#
# Structured experiment design with hypothesis, sample size
# calculation, analysis plan, and decision framework.

template:
  name: A/B Test Plan
  artifact_type: ab-test
  output_file: "_bmad-output/pdx-artifacts/ab-test-{experiment-name}.md"

structure:
  header:
    - artifact: "A/B Test Plan"
    - experiment: "{experiment-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"
    - test_type: "{A/B|A/B/n|multivariate}"

  sections:
    - name: "Hypothesis"
      required: true
      description: >
        State the hypothesis in structured format:

        "Changing **[variable]** from **[A: current state]** to **[B: proposed change]**
        will **[increase/decrease]** **[metric]** by **[minimum detectable effect]**
        because **[reasoning based on research, data, or theory]**."

        **Supporting Evidence:**
        - What qualitative or quantitative data supports this hypothesis?
        - What prior research, usability findings, or analytics suggest this change?
        - What is the theoretical mechanism (why should this work)?

        **Null Hypothesis (H0):** There is no difference in {metric} between A and B.
        **Alternative Hypothesis (H1):** {metric} for B differs from A by at least {MDE}.

    - name: "Metrics"
      required: true
      description: >
        **Primary Metric (OEC - Overall Evaluation Criterion):**
        | Parameter | Value |
        |-----------|-------|
        | Metric name | {e.g., conversion rate, click-through rate} |
        | Current baseline | {current value with date range} |
        | Minimum detectable effect (MDE) | {absolute or relative change} |
        | Measurement method | {how this is tracked} |

        **Secondary Metrics:**
        | Metric | Baseline | Expected Direction | Why It Matters |
        |--------|----------|--------------------|----------------|
        | {metric} | {value} | {increase/decrease/stable} | {rationale} |

        **Guardrail Metrics (must not degrade):**
        | Metric | Threshold | Action if Breached |
        |--------|-----------|-------------------|
        | {e.g., page load time} | {must stay under X} | {stop test, investigate} |
        | {e.g., error rate} | {must stay under X} | {stop test, investigate} |

    - name: "Variants"
      required: true
      description: >
        **Control (A):**
        - Description of current experience
        - Screenshot or link: {reference}
        - Key elements: {what the user sees and interacts with}

        **Treatment (B):**
        - Description of proposed change
        - Screenshot or link: {reference}
        - Key elements: {what differs from control}
        - Isolated variable: {the single thing being changed}

        **For A/B/n tests, additional variants:**
        | Variant | Description | Isolated Variable |
        |---------|-------------|-------------------|

        **Implementation Notes:**
        - Where does the change live (frontend, backend, config)?
        - Engineering effort estimate
        - Any technical constraints or dependencies

    - name: "Sample Size Calculation"
      required: true
      description: >
        | Parameter | Value |
        |-----------|-------|
        | Baseline conversion rate | {current rate, e.g., 5%} |
        | Minimum detectable effect (MDE) | {e.g., 10% relative = 0.5% absolute} |
        | Statistical power (1 - beta) | 0.80 (standard) |
        | Significance level (alpha) | 0.05 (two-tailed) |
        | Number of variants | {2 for A/B} |
        | Required sample per variant | {calculated} |
        | Total sample required | {calculated} |

        **Duration Estimate:**
        | Parameter | Value |
        |-----------|-------|
        | Daily eligible traffic | {number} |
        | Traffic allocation to test | {percentage} |
        | Effective daily sample | {number} |
        | Estimated duration | {days/weeks} |
        | Minimum duration | 1 full business cycle (7 days minimum) |
        | Maximum duration | {cap to avoid indefinite running} |

    - name: "Segmentation Plan"
      required: true
      description: >
        Pre-registered segments to analyze post-hoc:
        | Segment | Definition | Hypothesis | Min Sample |
        |---------|-----------|------------|------------|
        | {e.g., new vs returning} | {criteria} | {expected difference} | {n} |
        | {e.g., mobile vs desktop} | {criteria} | {expected difference} | {n} |

        **Important:** Segment analyses are exploratory unless pre-registered
        with adjusted significance levels (Bonferroni correction).

    - name: "Randomization Method"
      required: true
      description: >
        | Parameter | Value |
        |-----------|-------|
        | Randomization unit | {user, session, device, cookie} |
        | Allocation method | {deterministic hash, random assignment} |
        | Traffic split | {50/50, or other} |
        | Sticky assignment | {yes - user sees same variant across sessions} |
        | Exclusions | {who is excluded from the test} |
        | Ramp-up plan | {e.g., 10% day 1, 50% day 2, 100% day 3} |

        **Sample Ratio Mismatch (SRM) Check:**
        - Monitor daily for expected vs actual split
        - Flag if chi-squared test p < 0.01

    - name: "Analysis Plan"
      required: true
      description: >
        **Statistical Framework:**
        | Parameter | Value |
        |-----------|-------|
        | Test type | {two-proportion z-test, t-test, Mann-Whitney} |
        | Significance threshold | p < 0.05 (two-tailed) |
        | Confidence interval | 95% CI for effect size |
        | Multiple comparison correction | {Bonferroni, Holm, none if single metric} |

        **Practical vs Statistical Significance:**
        - A result can be statistically significant but practically meaningless
        - Define minimum meaningful effect: {what size effect justifies the change?}
        - Consider implementation cost vs expected lift

        **Analysis Steps:**
        1. Check SRM (sample ratio mismatch) before any analysis
        2. Evaluate primary metric with confidence interval
        3. Check guardrail metrics for degradation
        4. Analyze secondary metrics
        5. Run pre-registered segment analyses
        6. Document effect size, CI, and p-value for all metrics

    - name: "Decision Framework"
      required: true
      description: >
        | Outcome | Criteria | Action |
        |---------|----------|--------|
        | B wins | Primary metric improved, p < 0.05, no guardrail breach | Ship B to 100% |
        | A wins | Primary metric degraded or B shows no improvement | Keep A, archive learnings |
        | Inconclusive | p > 0.05 after full duration | Extend if underpowered, or accept null |
        | Guardrail breach | Any guardrail metric crosses threshold | Stop test, investigate, keep A |
        | Mixed results | Primary improves but secondary degrades | Stakeholder review, weigh trade-offs |

        **Escalation Path:**
        - Who makes the final ship/no-ship decision?
        - What stakeholders need to review results?
        - How will results be communicated to the team?

    - name: "Risks and Mitigations"
      required: true
      description: >
        | Risk | Likelihood | Impact | Mitigation |
        |------|-----------|--------|------------|
        | Novelty effect | Medium | Results fade after launch | Run for 2+ weeks, monitor post-launch |
        | Peeking / early stopping | High | Inflated false positive rate | Pre-commit to full duration, use sequential testing if needed |
        | Interaction effects | Medium | Other tests contaminate results | Check for overlapping experiments |
        | Seasonal variation | Low-Medium | Results not generalizable | Run across representative time period |
        | Instrumentation error | Medium | Invalid data | QA tracking before launch, SRM checks |
        | Survivorship bias | Low | Misleading retention metrics | Track from point of exposure, not activation |

    - name: "Pre-Launch Checklist"
      description: >
        - [ ] Hypothesis documented and reviewed
        - [ ] Sample size calculated and timeline approved
        - [ ] Tracking instrumented and QA verified
        - [ ] Variants implemented and visually QA'd
        - [ ] Randomization tested (correct split, sticky assignment)
        - [ ] Guardrail metrics instrumented
        - [ ] Stakeholders aligned on decision framework
        - [ ] Analysis plan pre-registered
        - [ ] Kill switch available if critical issues arise

    - name: "Next Steps"
      description: >
        - Implement winning variant or iterate based on learnings
        - Document results in experiment repository
        - Share insights with product and design teams
        - Identify follow-up experiments based on findings
        - Monitor post-launch metrics for sustained effect
