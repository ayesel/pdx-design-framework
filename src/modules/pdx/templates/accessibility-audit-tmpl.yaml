# Accessibility Audit Template
#
# WCAG 2.2 Level AA conformance audit with
# screen reader testing and remediation plan.

template:
  name: Accessibility Audit
  artifact_type: accessibility-audit
  output_file: "_bmad-output/pdx-artifacts/accessibility-audit-{scope-name}.md"

structure:
  header:
    - artifact: "Accessibility Audit"
    - scope: "{scope-name}"
    - standard: "WCAG 2.2 Level AA"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"

  sections:
    - name: "Executive Summary"
      description: >
        Overall conformance status, critical blockers, and top-priority remediation items.
        Include pass/fail/partial counts across all criteria.

    - name: "Audit Scope & Methodology"
      description: >
        What was audited (pages, flows, components), tools used,
        assistive technologies tested, and limitations of the audit.
        Note: Automated tools catch ~30% of issues. Manual testing is essential.

    - name: "Principle 1: Perceivable"
      description: >
        Information and UI components must be presentable in ways users can perceive.

        | Criterion | Level | Status | Issue Description | Location | Remediation |
        |-----------|-------|--------|-------------------|----------|-------------|
        | 1.1.1 Non-text Content | A | | | | |
        | 1.2.1 Audio/Video (Prerecorded) | A | | | | |
        | 1.2.2 Captions (Prerecorded) | A | | | | |
        | 1.2.3 Audio Description | A | | | | |
        | 1.2.5 Audio Description (Prerecorded) | AA | | | | |
        | 1.3.1 Info and Relationships | A | | | | |
        | 1.3.2 Meaningful Sequence | A | | | | |
        | 1.3.3 Sensory Characteristics | A | | | | |
        | 1.3.4 Orientation | AA | | | | |
        | 1.3.5 Identify Input Purpose | AA | | | | |
        | 1.4.1 Use of Color | A | | | | |
        | 1.4.2 Audio Control | A | | | | |
        | 1.4.3 Contrast (Minimum) | AA | | | | |
        | 1.4.4 Resize Text | AA | | | | |
        | 1.4.5 Images of Text | AA | | | | |
        | 1.4.10 Reflow | AA | | | | |
        | 1.4.11 Non-text Contrast | AA | | | | |
        | 1.4.12 Text Spacing | AA | | | | |
        | 1.4.13 Content on Hover or Focus | AA | | | | |

        Status: ✅ Pass, ❌ Fail, 🔶 Partial, ⬜ N/A

    - name: "Principle 2: Operable"
      description: >
        UI components and navigation must be operable.

        | Criterion | Level | Status | Issue Description | Location | Remediation |
        |-----------|-------|--------|-------------------|----------|-------------|
        | 2.1.1 Keyboard | A | | | | |
        | 2.1.2 No Keyboard Trap | A | | | | |
        | 2.1.4 Character Key Shortcuts | A | | | | |
        | 2.2.1 Timing Adjustable | A | | | | |
        | 2.2.2 Pause, Stop, Hide | A | | | | |
        | 2.3.1 Three Flashes or Below | A | | | | |
        | 2.4.1 Bypass Blocks | A | | | | |
        | 2.4.2 Page Titled | A | | | | |
        | 2.4.3 Focus Order | A | | | | |
        | 2.4.4 Link Purpose (In Context) | A | | | | |
        | 2.4.5 Multiple Ways | AA | | | | |
        | 2.4.6 Headings and Labels | AA | | | | |
        | 2.4.7 Focus Visible | AA | | | | |
        | 2.4.11 Focus Not Obscured (Minimum) | AA | | | | |
        | 2.5.1 Pointer Gestures | A | | | | |
        | 2.5.2 Pointer Cancellation | A | | | | |
        | 2.5.3 Label in Name | A | | | | |
        | 2.5.4 Motion Actuation | A | | | | |
        | 2.5.7 Dragging Movements | AA | | | | |
        | 2.5.8 Target Size (Minimum) | AA | | | | |

    - name: "Principle 3: Understandable"
      description: >
        Information and operation of the UI must be understandable.

        | Criterion | Level | Status | Issue Description | Location | Remediation |
        |-----------|-------|--------|-------------------|----------|-------------|
        | 3.1.1 Language of Page | A | | | | |
        | 3.1.2 Language of Parts | AA | | | | |
        | 3.2.1 On Focus | A | | | | |
        | 3.2.2 On Input | A | | | | |
        | 3.2.3 Consistent Navigation | AA | | | | |
        | 3.2.4 Consistent Identification | AA | | | | |
        | 3.2.6 Consistent Help | A | | | | |
        | 3.3.1 Error Identification | A | | | | |
        | 3.3.2 Labels or Instructions | A | | | | |
        | 3.3.3 Error Suggestion | AA | | | | |
        | 3.3.4 Error Prevention (Legal, Financial, Data) | AA | | | | |
        | 3.3.7 Redundant Entry | A | | | | |
        | 3.3.8 Accessible Authentication (Minimum) | AA | | | | |

    - name: "Principle 4: Robust"
      description: >
        Content must be robust enough for interpretation by assistive technologies.

        | Criterion | Level | Status | Issue Description | Location | Remediation |
        |-----------|-------|--------|-------------------|----------|-------------|
        | 4.1.2 Name, Role, Value | A | | | | |
        | 4.1.3 Status Messages | AA | | | | |

    - name: "Screen Reader Testing"
      description: >
        Manual testing results with screen readers:
        | Screen/Flow | Screen Reader | OS | Task | Result | Issues Found |

        Test with at minimum:
        - VoiceOver (macOS/iOS)
        - NVDA or JAWS (Windows)
        - TalkBack (Android) if mobile

    - name: "Keyboard Navigation Testing"
      description: >
        Keyboard-only testing results:
        | Page/Component | Tab Order Logical | Focus Visible | Trap-Free | All Actions Reachable | Issues |

    - name: "Prioritized Remediation Plan"
      description: >
        Issues ranked by impact and effort:
        | Priority | Issue | WCAG Criterion | Severity | Affected Users | Effort (S/M/L) | Fix Description |

        Priority order:
        1. Critical blockers (users cannot complete task)
        2. Serious barriers (significant difficulty)
        3. Minor issues (inconvenience)
        4. Enhancements (above minimum compliance)

    - name: "Next Steps"
      description: >
        Typically: development tickets for remediation,
        re-audit after fixes, or usability testing with
        assistive technology users.
