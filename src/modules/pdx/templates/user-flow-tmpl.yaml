# User Flow Template
#
# Generates a step-by-step user flow with decision points, error states,
# and Mermaid flowchart diagram.

template:
  name: User Flow
  artifact_type: user-flow
  output_file: "_bmad-output/pdx-artifacts/user-flow-{feature-name}.md"

structure:
  header:
    - artifact: "User Flow"
    - feature: "{feature-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Kai (Interaction Designer)"
    - personas: "{referenced-personas}"
    - requirements: "{referenced-requirements}"

  sections:
    - name: "Overview"
      description: >
        One paragraph describing the flow's purpose, the primary user,
        and the business goal it supports.

    - name: "Flow Diagram"
      description: >
        Mermaid flowchart TD (top-down) diagram. Use these conventions:
        - Rounded rectangles for start/end: ([Start]) and ([End])
        - Rectangles for actions: [Action]
        - Diamonds for decisions: {Decision?}
        - Hexagons for system processes: {{System Process}}
        - Red-styled nodes for error states
        - Green-styled nodes for success states
        - Dotted lines for optional/alternative paths
      format: |
        ```mermaid
        flowchart TD
            A([User arrives at {entry-point}]) --> B[{first-action}]
            B --> C{Decision point?}
            C -->|Yes| D[Happy path action]
            C -->|No| E[Alternative path]
            D --> F([Success state])
            E --> G[Error recovery]
            G --> B
            style F fill:#4CAF50,color:#fff
            style G fill:#f44336,color:#fff
        ```

    - name: "Step-by-Step Walkthrough"
      description: >
        Numbered list of every step in the flow. For each step include:
        1. Step number and name
        2. Actor (who does this)
        3. Action (what they do)
        4. System response (what happens)
        5. Success criteria (how you know it worked)
        6. Error scenarios (what can go wrong)

    - name: "Entry Points"
      description: >
        List every way a user can enter this flow. Include:
        - Direct navigation
        - Deep links
        - Notifications
        - Cross-flow transitions
        - Search results

    - name: "Exit Points"
      description: >
        List every way a user leaves this flow. Include:
        - Successful completion
        - Abandonment points
        - Error exits
        - Redirect to another flow
        - Timeout/session expiry

    - name: "Error States"
      description: >
        Table format for all error scenarios:
        | Step | Error | Cause | User Sees | Recovery Path |

    - name: "Screen States"
      description: >
        For each unique screen in the flow, list all possible states:
        - Empty state (first use / no data)
        - Loading state
        - Partial state (incomplete data)
        - Populated state (happy path)
        - Error state
        - Disabled state (permissions/conditions not met)

    - name: "Design Decisions"
      description: >
        Key decisions made during flow design and their rationale.
        Format: Decision | Options Considered | Chosen | Rationale

    - name: "Open Questions"
      description: >
        Unresolved items that need stakeholder, PM, or engineering input.

    - name: "Next Steps"
      description: >
        Recommended next artifacts to create from this flow.
        Typically: wireframes for key screens, state diagrams for
        complex components, or interaction maps for high-density areas.
