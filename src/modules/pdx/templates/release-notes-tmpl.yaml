# Release Notes Template
#
# Design-focused release notes in two versions:
# internal (detailed) and external (user-facing).

template:
  name: Release Notes
  artifact_type: release-notes
  output_file: "_bmad-output/pdx-artifacts/handoff-release-notes-{scope-name}.md"

structure:
  header:
    - artifact: "Release Notes"
    - release: "{scope-name}"
    - version: "{version}"
    - status: "draft"
    - created: "{date}"
    - author: "Relay (Design Ops)"

  sections:
    - name: "Internal Release Notes"
      description: >
        Detailed notes for the team:

        **What's New:**
        | Feature | Description | Design Rationale | Key Screens | Lead Designer |

        **What's Improved:**
        | Improvement | Before | After | Why | Research/Data Source |

        **What's Fixed:**
        | Fix | Issue | Root Cause | Solution | QA Source |

        **Accessibility Improvements:**
        | Improvement | WCAG Criterion | Impact | Affected Users |

        **Design System Updates:**
        | Update | Type (New/Modified/Deprecated) | Impact |

        **Metrics We Expect to Move:**
        | Metric | Current | Expected Direction | Measurement Plan |

        **Known Limitations:**
        | Limitation | Reason | Planned Resolution | Timeline |

        **Coming Next:**
        | Feature/Improvement | Status | Expected Release |

    - name: "External Release Notes"
      description: >
        User-facing notes (benefit-focused, no internal jargon):

        **What's New:**
        - [Feature name]: [One sentence describing the user benefit]

        **What's Improved:**
        - [Improvement]: [How the user's experience is better]

        **What's Fixed:**
        - [Fix]: [What was wrong and that it's resolved]

        Keep external notes:
        - Benefit-focused (what the user gains)
        - Free of technical jargon
        - Concise (1-2 sentences per item)
        - Grouped by impact (biggest first)

    - name: "Visual Highlights"
      description: >
        Key screens or interactions worth showcasing:
        | Highlight | Description | Screenshot Reference | Why It Matters |

    - name: "Next Steps"
      description: >
        Publish notes, update documentation, prepare for next release cycle.
