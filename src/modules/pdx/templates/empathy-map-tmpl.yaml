# Empathy Map Template
#
# Four-quadrant empathy map capturing what users say, think,
# do, and feel to build shared understanding of user perspective.

template:
  name: Empathy Map
  artifact_type: empathy-map
  output_file: "_bmad-output/pdx-artifacts/empathy-map-{persona}.md"

structure:
  header:
    - artifact: "Empathy Map"
    - persona: "{persona-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"
    - data_sources: "{interviews, observations, surveys, support logs}"

  sections:
    - name: "Persona / Segment"
      required: true
      description: >
        **Who is this empathy map for?**
        | Attribute | Detail |
        |-----------|--------|
        | Name / Segment | {persona name or user segment} |
        | Role | {job title, role in the product context} |
        | Demographics | {relevant demographic details} |
        | Experience level | {novice, intermediate, expert with product/domain} |
        | Relationship to product | {new user, power user, churned user, prospect} |

        **Data Foundation:**
        - Based on {number} interviews / observations / survey responses
        - Data collection period: {date range}
        - Confidence level: {high = 10+ data points, medium = 5-9, low = 2-4}

    - name: "Context"
      required: true
      description: >
        **Situation being mapped:**
        - What task or scenario is this person in?
        - Where are they (physical and digital environment)?
        - When does this situation occur (frequency, triggers)?
        - Who else is involved (colleagues, customers, family)?
        - What tools or systems are they using?

        **Key context factors:**
        | Factor | Detail | Impact on Experience |
        |--------|--------|---------------------|
        | Environment | {where they are} | {how it affects behavior} |
        | Time pressure | {low, moderate, high} | {how it shapes decisions} |
        | Stakes | {what's at risk if they fail} | {motivation and anxiety level} |
        | Social context | {alone, observed, collaborative} | {influence on behavior} |

    - name: "Says"
      required: true
      description: >
        What do they say out loud? Direct quotes from research.

        **Statements about the product/task:**
        - "{direct quote}" — {source: P3, interview}
        - "{direct quote}" — {source}
        - "{direct quote}" — {source}

        **Statements to others (colleagues, support, etc.):**
        - "{direct quote}" — {source}
        - "{direct quote}" — {source}

        **Key patterns in language:**
        - Words they use: {terminology, jargon, metaphors}
        - Words they avoid: {what they don't say, topics they deflect}
        - Tone: {frustrated, confident, confused, hopeful}

    - name: "Thinks"
      required: true
      description: >
        What are they thinking but might not say? Inferred from behavior, hesitations, and indirect comments.

        **Concerns and worries:**
        - {what keeps them up at night about this task}
        - {fears about getting it wrong}

        **Assumptions and beliefs:**
        - {what they believe to be true about the product/process}
        - {mental models they operate with}

        **Internal questions:**
        - "Am I doing this right?"
        - "{other questions they likely have}"

        **Aspirations:**
        - {what they hope to achieve}
        - {how they want to be perceived}

        **Note:** Distinguish between what is directly evidenced vs. inferred.
        Mark inferences with [inferred] tag.

    - name: "Does"
      required: true
      description: >
        What actions and behaviors do they exhibit? Observable behaviors from research.

        **Primary behaviors:**
        - {key action observed} — frequency: {always, often, sometimes}
        - {key action} — frequency: {frequency}

        **Workarounds:**
        - {creative solutions they've built to compensate for product gaps}
        - {manual processes they use alongside the product}

        **Information seeking:**
        - {where they go for help: documentation, colleagues, Google, support}
        - {how they learn new features or processes}

        **Decision-making patterns:**
        - {how they evaluate options}
        - {what triggers action vs. delay}

        **Interactions with others:**
        - {how they collaborate or delegate}
        - {who they consult before making decisions}

    - name: "Feels"
      required: true
      description: >
        What emotions do they experience? Emotional states observed or expressed.

        **Positive emotions:**
        - {e.g., satisfaction when completing a task successfully}
        - {e.g., pride when helping a colleague}

        **Negative emotions:**
        - {e.g., frustration when the system is slow}
        - {e.g., anxiety about making errors with consequences}

        **Emotional triggers:**
        | Trigger | Emotion | Intensity (1-5) | Frequency |
        |---------|---------|-----------------|-----------|
        | {event} | {emotion} | {intensity} | {how often} |

        **Emotional journey across the task:**
        - Start: {emotion at beginning of task}
        - Middle: {emotion during core activity}
        - End: {emotion at completion or abandonment}

    - name: "User Goal"
      required: true
      description: >
        **Central goal (center of the empathy map):**

        "{What this person is ultimately trying to accomplish}"

        **Functional goal:** {what they need to get done}
        **Emotional goal:** {how they want to feel}
        **Social goal:** {how they want to be perceived by others}

        **Job to Be Done (JTBD) format:**
        "When I am [situation], I want to [motivation], so I can [expected outcome]."

    - name: "Pain Points"
      required: true
      description: >
        **Identified pain points (ranked by severity):**
        | # | Pain Point | Quadrant Source | Severity (1-5) | Frequency | Evidence Count |
        |---|-----------|----------------|----------------|-----------|----------------|
        | 1 | {description} | {Says/Thinks/Does/Feels} | {severity} | {daily, weekly, rare} | {n observations} |

        **Root causes:**
        - {pain point} is caused by {underlying issue}
        - {pain point} is exacerbated by {contextual factor}

    - name: "Gains"
      required: true
      description: >
        **What creates value for this person:**
        | # | Gain | Quadrant Source | Importance (1-5) | Currently Delivered? |
        |---|------|----------------|------------------|---------------------|
        | 1 | {what makes them successful/happy} | {quadrant} | {importance} | {yes, partially, no} |

        **Unmet gains (opportunities):**
        - {what they want but don't currently have}
        - {what would delight them beyond expectations}

    - name: "Visualization"
      required: true
      description: >
        Mermaid quadrant chart showing the empathy map:

      format: |
        ```mermaid
        quadrantChart
            title Empathy Map: {persona-name}
            x-axis "Observable" --> "Internal"
            y-axis "Passive" --> "Active"
            quadrant-1 THINKS
            quadrant-2 DOES
            quadrant-3 SAYS
            quadrant-4 FEELS
            Key Thought: [0.75, 0.75]
            Key Action: [0.25, 0.75]
            Key Statement: [0.25, 0.25]
            Key Emotion: [0.75, 0.25]
        ```

        **Summary View:**
        ```
        +------------------+------------------+
        |      THINKS      |      FEELS       |
        |                  |                  |
        | - {key thought}  | - {key emotion}  |
        | - {key thought}  | - {key emotion}  |
        |                  |                  |
        +--------+---------+---------+--------+
                 |    USER GOAL:     |
                 | {central goal}    |
        +--------+---------+---------+--------+
        |      SAYS        |      DOES        |
        |                  |                  |
        | - "{key quote}"  | - {key behavior} |
        | - "{key quote}"  | - {key behavior} |
        |                  |                  |
        +------------------+------------------+
        ```

    - name: "Design Implications"
      required: true
      description: >
        **What this empathy map tells us for design:**
        | Insight | Source Quadrants | Design Action | Priority |
        |---------|-----------------|---------------|----------|
        | {insight from empathy map} | {Says + Does, Thinks + Feels, etc.} | {design recommendation} | {high|medium|low} |

        **Contradictions to explore:**
        - Says vs Does: {where stated preferences differ from actual behavior}
        - Thinks vs Feels: {where rational beliefs conflict with emotional responses}

        **Design principles derived from this map:**
        1. {principle grounded in user evidence}
        2. {principle}

    - name: "Next Steps"
      description: >
        - Validate empathy map findings with additional user research
        - Use as input for persona development or refinement
        - Share with team to build shared empathy for this user segment
        - Feed pain points into journey mapping and opportunity prioritization
        - Reference during design reviews to check alignment with user needs
        - Create empathy maps for other key user segments for comparison
