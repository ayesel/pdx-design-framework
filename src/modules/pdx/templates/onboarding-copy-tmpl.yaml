# Onboarding Copy Template
#
# Write copy for onboarding flows — welcoming, benefit-focused,
# and brief. Show value before asking for commitment.

template:
  name: Onboarding Copy
  artifact_type: onboarding-copy
  output_file: "_bmad-output/pdx-artifacts/content-onboarding-copy-{scope-name}.md"

structure:
  header:
    - artifact: "Onboarding Copy"
    - target: "{scope-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Echo (Content Strategist)"
    - reading_level: "{grade level}"

  sections:
    - name: "Onboarding Strategy"
      description: >
        - Total steps: [n]
        - Estimated completion time: [minutes]
        - Can user skip? [yes/no]
        - Progressive disclosure: [what's optional vs required]
        - Value-first principle: show benefit before asking for data

    - name: "Step-by-Step Copy"
      description: >
        For each onboarding step:

        **Step [N] of [Total]: [Step Purpose]**
        - **Headline Options**:
          - Option A: [benefit-focused]
          - Option B: [action-focused]
          - Recommended: [choice] — Reasoning: [why]
        - **Body Text Options**:
          - Option A: [brief, value-focused]
          - Option B: [instructional]
          - Recommended: [choice] — Reasoning: [why]
        - **CTA Label**: [specific action, not "Next"]
        - **Skip Option Copy**: [e.g., "Skip for now" or "I'll do this later"]
        - **Progress Indicator**: [e.g., "Step 2 of 4" or progress dots]
        - **Value Proposition**: Why should the user care about this step?
        - **Estimated Time**: [seconds/minutes for this step]

    - name: "Permission Requests"
      description: >
        For steps that request permissions (notifications, location, contacts, etc.):
        | Permission | Why We Need It | User Benefit | Decline Copy | Accept Copy |

        Rule: explain the benefit to the USER, not to the product.

    - name: "Welcome & Completion"
      description: >
        **Welcome Screen**:
        - Headline: [warm, brief]
        - Subtext: [what they'll accomplish in onboarding]
        - CTA: [inviting, not demanding]

        **Completion Screen**:
        - Headline: [celebratory but not over-the-top]
        - Subtext: [what they can do now]
        - CTA: [primary action to start using the product]

    - name: "Returning User Handling"
      description: >
        Copy for users who abandoned onboarding and returned:
        - Resume prompt: [e.g., "Welcome back! Pick up where you left off?"]
        - Start over option: [e.g., "Start fresh"]

    - name: "Next Steps"
      description: >
        Typically: empty states for screens users will see immediately after onboarding,
        or microcopy for the core screens they'll land on.
