# Design Review Template
#
# Comprehensive design quality review covering visual hierarchy,
# typography, color, spacing, states, and interaction design.

template:
  name: Design Review
  artifact_type: design-review
  output_file: "_bmad-output/pdx-artifacts/qa-design-review-{scope-name}.md"

structure:
  header:
    - artifact: "Design Review"
    - target: "{scope-name}"
    - status: "{pass|fail|conditional-pass}"
    - version: "1.0"
    - created: "{date}"
    - author: "Sage (Design QA)"
    - verdict: "{READY|CONDITIONAL|NOT READY}"

  sections:
    - name: "Executive Summary"
      description: >
        Overall quality verdict with issue counts:
        | Severity | Count |
        | Blocker | |
        | Major | |
        | Minor | |
        | Suggestion | |
        Overall score: [X]/5

    - name: "Visual Hierarchy"
      description: >
        Score: [1-5]
        | Criterion | Status | Notes |
        - Primary action prominence
        - Information reading order
        - Whitespace grouping
        - Visual weight distribution
        - Content density appropriate

    - name: "Typography Compliance"
      description: >
        Score: [1-5]
        | Element | Expected (Token) | Actual | Match | Issue |
        Check: font families, sizes, weights, line heights, letter spacing.
        Flag any values not in the type scale.

    - name: "Color Usage"
      description: >
        Score: [1-5]
        | Element | Expected Token | Actual Value | Match | Contrast Ratio | Pass |
        Check: palette compliance, semantic color usage, contrast ratios,
        color-only information conveyance.

    - name: "Spacing & Alignment"
      description: >
        Score: [1-5]
        | Element | Expected Spacing | Actual | Match | Issue |
        Check: grid alignment, consistent padding, margin rhythm, pixel alignment.

    - name: "Iconography Consistency"
      description: >
        Score: [1-5]
        | Icon | Set | Size | Contrast | Label | Issue |
        Check: approved icon set, consistent sizing, sufficient contrast,
        accessibility labels.

    - name: "Interactive States"
      description: >
        Score: [1-5]
        | Component | Default | Hover | Focus | Active | Disabled | Loading | Issue |
        Check: all states designed, focus rings visible, disabled states explained.

    - name: "Animation & Motion"
      description: >
        | Animation | Duration | Easing | Purpose | prefers-reduced-motion | Issue |
        Check: motion specs included, respects reduced motion, purposeful animation.

    - name: "Dark Mode (if applicable)"
      description: >
        | Element | Light Mode | Dark Mode | Contrast | Issue |
        Check: all screens have dark variants, contrast maintained, token mapping correct.

    - name: "Issues Table"
      description: >
        | # | Category | Issue | Severity | Location | Fix | Effort |

    - name: "Positive Findings"
      description: >
        What's done well — patterns worth preserving or extending.

    - name: "Next Steps"
      description: >
        Fix blockers → re-review, or proceed to system-check and responsive-check.
