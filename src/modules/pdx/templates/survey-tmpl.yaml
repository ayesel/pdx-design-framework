# Survey Design Template
#
# Structured survey plan covering question design,
# bias prevention, distribution, and analysis.

template:
  name: Survey Design
  artifact_type: survey
  output_file: "_bmad-output/pdx-artifacts/survey-{topic}.md"

structure:
  header:
    - artifact: "Survey Design"
    - topic: "{topic}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"
    - estimated_completion_time: "{minutes}"

  sections:
    - name: "Research Objective"
      required: true
      description: >
        What decisions will survey results inform?

        **Primary Question:** {the core question this survey answers}
        **Secondary Questions:**
        1. {supporting question}
        2. {supporting question}

        **Out of Scope:** What this survey will NOT answer (and what method would).
        **How Results Will Be Used:** {report, prioritization, benchmarking, segmentation}

    - name: "Target Audience and Sampling"
      required: true
      description: >
        | Parameter | Value |
        |-----------|-------|
        | Population | {who the survey represents} |
        | Sampling method | {random, stratified, convenience, snowball} |
        | Target sample size | {n, with justification} |
        | Confidence level | {95% standard} |
        | Margin of error | {+/- X%} |
        | Recruitment source | {email list, in-app, panel, social media} |
        | Incentive | {type and amount} |

        **Inclusion Criteria:**
        | Criterion | Requirement |
        |-----------|-------------|

        **Exclusion Criteria:**
        | Criterion | Reason for Exclusion |
        |-----------|---------------------|

        **Quota Targets (if stratified):**
        | Segment | Target % | Target n |
        |---------|----------|----------|

    - name: "Distribution Method"
      required: true
      description: >
        | Parameter | Value |
        |-----------|-------|
        | Channel | {email, in-app intercept, SMS, social, QR code} |
        | Timing | {when survey is triggered or sent} |
        | Follow-up reminders | {schedule: e.g., day 3 and day 7} |
        | Survey window | {open date to close date} |
        | Tool | {Typeform, Google Forms, Qualtrics, SurveyMonkey, Maze} |

        **Response Rate Optimization:**
        - Personalized invitation with clear purpose
        - Estimated completion time in invitation
        - Mobile-optimized survey design
        - Progress bar visible to respondent

    - name: "Estimated Completion Time"
      required: true
      description: >
        | Audience | Target Time | Max Acceptable |
        |----------|-------------|----------------|
        | Consumer / general public | Under 5 minutes | 7 minutes |
        | B2B / professional users | Under 10 minutes | 15 minutes |
        | Internal stakeholders | Under 10 minutes | 12 minutes |

        **Time Budget per Section:**
        | Section | Questions | Est. Time |
        |---------|-----------|-----------|
        | Opening / screener | {n} | {seconds} |
        | Core questions | {n} | {minutes} |
        | Demographics | {n} | {seconds} |
        | Total | {n} | {minutes} |

        Rule of thumb: ~30 seconds per closed question, ~90 seconds per open-ended.

    - name: "Question Design"
      required: true
      description: >
        **Question Types Available:**
        | Type | When to Use | Example |
        |------|-------------|---------|
        | Likert scale (5 or 7 point) | Attitudes, satisfaction, agreement | "How satisfied are you with...?" |
        | Single select | Mutually exclusive categories | "Which best describes your role?" |
        | Multi-select | Non-exclusive options | "Which features do you use? (select all)" |
        | Open-ended | Rich qualitative feedback | "What would you change about...?" |
        | NPS (0-10) | Loyalty benchmarking | "How likely are you to recommend...?" |
        | SUS (10 items) | Usability benchmarking | Standard System Usability Scale |
        | Matrix / grid | Multiple items on same scale | "Rate each feature on importance" |
        | Ranking | Priority ordering | "Rank these features 1-5" |
        | Slider | Continuous scale | "How confident are you? (0-100)" |

        **Questions:**
        | # | Question Text | Type | Options / Scale | Required | Logic |
        |---|--------------|------|-----------------|----------|-------|
        | 1 | {question} | {type} | {options} | {yes/no} | {skip logic if any} |

    - name: "Question Order"
      required: true
      description: >
        Follow the funnel approach:

        **1. Opening (Easy, Engaging)**
        - Start with easy, non-threatening questions
        - Build rapport and set context
        - Screener questions if needed (disqualify early)

        **2. Core Questions (Most Important)**
        - Place primary research questions here
        - Group by topic for cognitive flow
        - Most sensitive or complex questions in middle (after warmup, before fatigue)

        **3. Demographics (End)**
        - Standard demographic questions last
        - Only ask demographics relevant to analysis
        - Mark as optional where appropriate

        **Ordering Principles:**
        - General before specific
        - Unaided recall before aided recall
        - Behavioral before attitudinal
        - Positive framing before exploring negatives

    - name: "Bias Prevention"
      required: true
      description: >
        **Review each question for:**
        | Bias Type | Check | Example Fix |
        |-----------|-------|-------------|
        | Leading questions | Does wording suggest a "right" answer? | "How great is...?" to "How would you rate...?" |
        | Double-barreled | Does it ask two things at once? | Split into separate questions |
        | Social desirability | Will respondents answer honestly? | Emphasize anonymity, use indirect framing |
        | Acquiescence | Will people just agree? | Mix positively and negatively worded items |
        | Anchoring | Does question order bias later answers? | Randomize option order, consider question sequence |
        | Recall bias | Can respondents accurately remember? | Limit recall period, use recognition over recall |
        | Sampling bias | Does distribution method exclude groups? | Use multiple channels |

        **Additional Checks:**
        - All scales have balanced positive/negative anchors
        - "Other" and "N/A" options included where appropriate
        - No jargon or technical language unfamiliar to respondents
        - Response options are exhaustive and mutually exclusive

    - name: "Skip Logic and Branching"
      description: >
        | Trigger Question | Response | Branch To | Rationale |
        |-----------------|----------|-----------|-----------|
        | Q{n} | {specific answer} | Q{n} | {why this path} |
        | Q{n} | {specific answer} | End survey | {disqualification reason} |

        **Logic Flow Diagram:**
        ```
        Q1 → Q2
             ├── If "Yes" → Q3a → Q4
             └── If "No"  → Q3b → Q4
        Q4 → Q5 (all respondents)
        ```

    - name: "Pilot Test Plan"
      required: true
      description: >
        **Before full launch:**
        - [ ] Internal review: 2-3 colleagues complete and provide feedback
        - [ ] Pilot with 5-10 target respondents
        - [ ] Check average completion time against target
        - [ ] Review drop-off rates by question
        - [ ] Verify skip logic works correctly
        - [ ] Check open-ended responses for question clarity
        - [ ] Confirm data exports correctly for analysis
        - [ ] Test on mobile devices

        **Pilot Adjustments:**
        | Issue Found | Question | Change Made |
        |-------------|----------|-------------|

    - name: "Analysis Plan"
      required: true
      description: >
        **Quantitative Analysis:**
        - Descriptive statistics: frequencies, means, medians, standard deviations
        - Cross-tabulations by key segments
        - NPS calculation: % Promoters - % Detractors
        - SUS score calculation (if applicable)
        - Confidence intervals for key metrics
        - Statistical tests: chi-square, t-test, ANOVA as appropriate

        **Qualitative Analysis (open-ended responses):**
        - Thematic coding: identify recurring themes
        - Sentiment analysis: positive / neutral / negative
        - Quote extraction for reporting
        - Word frequency or word cloud for pattern detection

        **Reporting:**
        - Executive summary with top findings
        - Segmented analysis for key audience groups
        - Comparison to benchmarks or prior surveys (if available)
        - Data visualizations for key metrics
        - Raw data export for stakeholder exploration

    - name: "Response Rate Targets"
      required: true
      description: >
        | Channel | Typical Response Rate | Target | Action if Below Target |
        |---------|----------------------|--------|----------------------|
        | Email (existing users) | 10-30% | {target}% | Send reminder, shorten survey |
        | In-app intercept | 5-15% | {target}% | Adjust trigger timing |
        | Panel | 20-40% | {target}% | Increase incentive |
        | Social media | 1-5% | {target}% | Boost post, widen targeting |

        **Monitoring Schedule:**
        - Day 1: Check initial responses and drop-off rates
        - Day 3: First reminder if below target pace
        - Day 7: Second reminder, assess if extension needed
        - Close date: Final response count and quality check

    - name: "Next Steps"
      description: >
        - Analyze results and produce research synthesis
        - Share findings with stakeholders via summary report
        - Identify follow-up qualitative research for deep dives
        - Feed quantitative results into prioritization frameworks
        - Establish benchmarks for future survey iterations
