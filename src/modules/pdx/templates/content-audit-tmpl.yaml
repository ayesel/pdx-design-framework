# Content Audit Template
#
# Audit existing copy across screens for consistency, clarity,
# inclusivity, and voice/tone compliance.

template:
  name: Content Audit
  artifact_type: content-audit
  output_file: "_bmad-output/pdx-artifacts/content-audit-{scope-name}.md"

structure:
  header:
    - artifact: "Content Audit"
    - target: "{scope-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Echo (Content Strategist)"

  sections:
    - name: "Audit Summary"
      description: >
        | Category | Items Checked | Issues | Severity Breakdown |
        | Consistency | | | |
        | Clarity | | | |
        | Inclusivity | | | |
        | Tone compliance | | | |
        | Jargon | | | |
        | Placeholder copy | | | |
        | Truncation | | | |
        | Translation readiness | | | |

    - name: "Consistency Check"
      description: >
        Same action = same label everywhere:
        | Action | Screen A Label | Screen B Label | Screen C Label | Consistent | Fix |

        Common inconsistencies to check:
        - "Log in" vs "Sign in" vs "Login"
        - "Save" vs "Submit" vs "Done"
        - "Cancel" vs "Discard" vs "Never mind"
        - "Delete" vs "Remove" vs "Trash"

    - name: "Clarity Score"
      description: >
        Reading level assessment per screen:
        | Screen | Word Count | Reading Level | Target | Pass | Complex Words |

        Flag: sentences over 25 words, passive voice, double negatives,
        complex words with simpler alternatives.

    - name: "Inclusivity Check"
      description: >
        | Screen | Element | Current Copy | Issue | Recommended Fix |

        Check for:
        - Gendered language (he/she defaults)
        - Ableist terms (crazy, blind spot, lame)
        - Cultural assumptions (Western date formats, idioms)
        - Binary gender assumptions in forms
        - Assumptions about family structure, ability, or background

    - name: "Tone Compliance"
      description: >
        | Screen | Context | Expected Tone | Actual Tone | Match | Issue |

        Compare against voice/tone guidelines (if they exist).

    - name: "Jargon Check"
      description: >
        | Term | Screen | User-Facing | Replacement | Priority |

        Flag: technical terms, internal vocabulary, acronyms without expansion.

    - name: "Placeholder Copy Still in Production"
      description: >
        | Screen | Element | Current Copy | Status | Action |

        Flag: "Lorem ipsum", "TBD", "placeholder", "TODO", "test", "[insert]".

    - name: "Truncation Issues"
      description: >
        | Screen | Element | Full Copy | Truncated At | Has Ellipsis | Accessible |

    - name: "Translation Readiness"
      description: >
        | Screen | Element | Issue | Impact on Translation |

        Check: hardcoded strings, concatenated strings, text in images,
        text that will expand 30-50%, date/number formatting, RTL considerations.

    - name: "Prioritized Fixes"
      description: >
        | # | Screen | Element | Issue | Fix | Severity | Effort |

    - name: "Next Steps"
      description: >
        Typically: voice/tone guidelines if none exist,
        or microcopy rewrites for highest-priority issues.
