# Affinity Diagram / Thematic Analysis Template
#
# Structured approach to qualitative data analysis using
# coding, affinity diagramming, and theme elevation.

template:
  name: Affinity Diagram / Thematic Analysis
  artifact_type: affinity-diagram
  output_file: "_bmad-output/pdx-artifacts/affinity-diagram-{topic}.md"

structure:
  header:
    - artifact: "Affinity Diagram / Thematic Analysis"
    - topic: "{topic}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"
    - data_sources: "{interviews, surveys, usability tests, support tickets}"

  sections:
    - name: "Data Inputs"
      required: true
      description: >
        **Sources Being Analyzed:**
        | Source | Type | Volume | Date Range |
        |--------|------|--------|-----------|
        | {e.g., user interviews} | {qualitative} | {12 transcripts} | {date range} |
        | {e.g., survey open-ends} | {qualitative} | {230 responses} | {date range} |
        | {e.g., usability test notes} | {qualitative} | {8 sessions} | {date range} |
        | {e.g., support tickets} | {mixed} | {150 tickets} | {date range} |

        **Data Preparation:**
        - Raw data cleaned and anonymized
        - Transcripts reviewed for accuracy
        - Data organized by source for traceability
        - Total observations/data points to code: {estimated number}

    - name: "Coding Approach"
      required: true
      description: >
        **Coding Method:**
        | Approach | Description | When to Use |
        |----------|-------------|-------------|
        | Open coding | Generate codes from data without preconceptions | Exploratory research, new domains |
        | Axial coding | Organize codes around central categories | After open coding, building relationships |
        | Selective coding | Focus on core categories and their connections | Final synthesis, theory building |

        **Selected approach:** {open | axial | selective | combined}

        **Coding Protocol:**
        - Unit of analysis: {sentence, paragraph, thought unit}
        - Coding independently or collaboratively: {method}
        - Inter-rater reliability: {if multiple coders, how agreement is measured}
        - Code book: {developing iteratively or using existing framework}

        **Initial Code Categories (if using axial/selective):**
        | Code | Definition | Example Data |
        |------|-----------|-------------|

    - name: "Process: Extract, Sort, Name, Relate, Elevate"
      required: true
      description: >
        **Step 1: EXTRACT — Pull observations from data**
        - Write each observation on its own sticky note or card
        - One insight per note (atomic observations)
        - Include source reference for traceability
        - Use participant's own words where possible
        - Target: {estimated number of individual observations}

        **Step 2: SORT — Group related observations**
        - Cluster observations by similarity (bottom-up)
        - Do NOT start with predefined categories
        - Move notes that don't fit; create new groups freely
        - Groups should have 3-8 items (split or merge as needed)
        - Outliers are valuable — don't force-fit

        **Step 3: NAME — Label each cluster**
        - Name should capture the shared meaning, not just a topic
        - Good: "Users distrust auto-save because they can't see confirmation"
        - Bad: "Auto-save" (too vague)
        - Review names for accuracy — does every item in the group fit?

        **Step 4: RELATE — Connect themes to each other**
        - Identify parent-child relationships between groups
        - Map causal connections (A causes B)
        - Note contradictions between groups
        - Look for cross-cutting patterns that span multiple themes

        **Step 5: ELEVATE — Distill into actionable insights**
        - What are the 3-5 overarching themes?
        - What design implications does each theme carry?
        - What is surprising or challenges assumptions?
        - What needs further investigation?

    - name: "Theme Documentation"
      required: true
      description: >
        Document each theme using this template:

        **Theme {N}: {Theme Name}**
        | Attribute | Detail |
        |-----------|--------|
        | Name | {descriptive theme name} |
        | Evidence | {number of supporting observations} |
        | Strength | {strong: 10+ observations, moderate: 5-9, emerging: 2-4} |
        | Sources | {which data sources contribute} |
        | Design Implication | {what this means for the product/service} |
        | Counter-Evidence | {observations that contradict or nuance this theme} |
        | Participant Quotes | {2-3 representative quotes} |

        **Example:**
        **Theme 1: "Users create manual workarounds for missing bulk actions"**
        | Attribute | Detail |
        |-----------|--------|
        | Evidence | 14 observations across 8 participants |
        | Strength | Strong |
        | Sources | Interviews (8), usability tests (4), support tickets (2) |
        | Design Implication | Batch operations are a high-value feature gap |
        | Counter-Evidence | 2 participants preferred item-by-item for accuracy |
        | Quotes | "I end up opening 20 tabs..." / "I wish I could just select all" |

    - name: "Visualization"
      required: true
      description: >
        Mermaid mindmap showing theme hierarchy:

      format: |
        ```mermaid
        mindmap
          root((Research Findings))
            Theme 1
              Sub-theme 1a
                Observation
                Observation
              Sub-theme 1b
                Observation
            Theme 2
              Sub-theme 2a
                Observation
              Sub-theme 2b
                Observation
                Observation
            Theme 3
              Sub-theme 3a
                Observation
        ```

        **Theme Strength Summary:**
        | Theme | Observations | Sources | Strength | Priority |
        |-------|-------------|---------|----------|----------|
        | {theme 1} | {n} | {n sources} | {strong|moderate|emerging} | {high|medium|low} |

    - name: "Insights and Implications"
      required: true
      description: >
        **Key Insights (ranked by impact):**
        | # | Insight | Supporting Themes | Confidence | Design Action |
        |---|---------|------------------|------------|---------------|
        | 1 | {insight} | {theme names} | {high|medium|low} | {what to do} |

        **Surprises and Challenged Assumptions:**
        | Assumption | What We Found | Implication |
        |-----------|--------------|-------------|
        | {what we believed} | {what data shows} | {how this changes our approach} |

        **Gaps in the Data:**
        - {What questions remain unanswered?}
        - {What groups or scenarios are underrepresented?}
        - {What follow-up research would strengthen these findings?}

    - name: "Next Steps"
      description: >
        - Share findings with design and product teams
        - Use themes to inform persona development or refinement
        - Feed design implications into ideation workshops
        - Prioritize themes by impact and feasibility for roadmap input
        - Conduct follow-up research to fill identified gaps
        - Create design principles grounded in the strongest themes
