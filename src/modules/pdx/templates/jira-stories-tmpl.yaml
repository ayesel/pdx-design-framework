# Jira Stories Template
#
# Generate BMAD-compatible developer stories from design artifacts.
# Stories MUST match BMAD's dev-story template exactly so the dev agent
# can consume them without transformation.

template:
  name: BMAD-Compatible Story
  artifact_type: story
  output_file: "_bmad-output/implementation-artifacts/stories/{epic}-{story}-{slug}.md"

structure:
  story_format: |
    # Story {epic}.{story}: {title}

    ## Story

    **As a** {persona},
    **I want to** {action},
    **So that** {outcome}.

    {description — 2-3 sentences of context about what this story delivers and why it matters}

    ## Acceptance Criteria

    {Use strict BDD format — no named ACs, just Given/When/Then}

    1. **Given** {precondition}
       **When** {action}
       **Then** {expected result}

    2. **Given** {precondition}
       **When** {action}
       **Then** {expected result}

    3. **Given** {precondition}
       **When** {action}
       **Then** {expected result}

    {Include error/edge case ACs:}

    4. **Given** {error condition}
       **When** {action}
       **Then** {error handling behavior}

    ## Tasks / Subtasks

    {Checkbox format with AC references}

    - [ ] {Task 1 description} (AC: 1)
    - [ ] {Task 2 description} (AC: 1, 2)
    - [ ] {Task 3 description} (AC: 3)
    - [ ] {Task 4 description} (AC: 4)
    - [ ] Write/update tests for acceptance criteria
    - [ ] Manual QA verification

    ## Dev Notes

    {Technical implementation guidance — what the dev agent needs to know}

    ### Project Structure Notes

    {Where new files should go, what existing files to modify}

    - New files: {list of files to create with paths}
    - Modified files: {list of existing files that need changes}
    - Test files: {list of test files to create/update}

    ### References

    {Links to design artifacts, architecture docs, and related stories}

    - PRD: {path to relevant PRD section}
    - Architecture: {path to relevant architecture section}
    - PDX Design Artifacts:
      - {path to user flow if relevant}
      - {path to wireframe if relevant}
      - {path to component spec if relevant}
    - Design Tokens: {path to tokens file if new tokens needed}
    - Related Stories: {list of related/dependent story IDs}

    ## Dev Agent Record

    {This section is filled in by the BMAD dev agent during implementation.
    Leave it empty with the scaffolding below.}

    ### Agent Model Used

    {To be filled by dev agent}

    ### Debug Log References

    {To be filled by dev agent}

    ### Completion Notes List

    {To be filled by dev agent}

    ### File List

    {To be filled by dev agent — list of all files created/modified}

  formatting_rules:
    - "Acceptance Criteria MUST use strict BDD format: Given/When/Then"
    - "Do NOT use named ACs like '1. **AC1 — Name**:' — use numbered Given/When/Then only"
    - "Do NOT add a ## Context section — fold priority, points, personas into Dev Notes"
    - "ALWAYS include the Dev Agent Record section with empty subsections"
    - "ALWAYS include Project Structure Notes and References in Dev Notes"
    - "Tasks MUST reference which AC they satisfy in parentheses"
    - "Filenames MUST follow {epic}-{story}-{slug}.md pattern"
    - "Sprint-status keys MUST match filename without .md extension"
