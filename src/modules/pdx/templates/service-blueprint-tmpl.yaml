# Service Blueprint Template
#
# Multi-layer service blueprint mapping customer actions,
# frontstage/backstage processes, and support systems.

template:
  name: Service Blueprint
  artifact_type: service-blueprint
  output_file: "_bmad-output/pdx-artifacts/service-blueprint-{service}.md"

structure:
  header:
    - artifact: "Service Blueprint"
    - service: "{service-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"
    - scope: "{end-to-end | specific touchpoint}"

  sections:
    - name: "Service Scope"
      required: true
      description: >
        **Service Being Mapped:** {service name and description}
        **Scope:** {end-to-end experience or specific segment}

        **Boundaries:**
        - Start point: {where the journey begins, e.g., "user visits landing page"}
        - End point: {where the journey ends, e.g., "user receives order confirmation"}
        - Excluded: {what is intentionally out of scope}

        **Context:**
        - Target user/persona: {who experiences this service}
        - Scenario: {specific use case being mapped}
        - Data sources: {research, interviews, process documentation, observation}
        - Current state or future state: {which is this blueprint describing?}

    - name: "Blueprint Layers"
      required: true
      description: >
        The five layers of the service blueprint, from customer-facing to support:

        **1. Physical Evidence:**
        Tangible artifacts the customer encounters at each step.
        Examples: website, email, receipt, packaging, signage, app notification.

        **2. Customer Actions:**
        Steps the customer takes to interact with the service.
        These are visible, voluntary actions by the user.

        **3. Frontstage (Onstage) Actions:**
        Employee or system actions visible to the customer.
        Examples: chat agent response, loading indicator, confirmation email.

        **4. Backstage (Offstage) Actions:**
        Employee or system actions NOT visible to the customer but necessary for delivery.
        Examples: order processing, fraud check, inventory lookup.

        **5. Support Processes:**
        Internal systems, third-party services, and infrastructure that enable the service.
        Examples: CRM, payment gateway, shipping API, database operations.

    - name: "Blueprint Table"
      required: true
      description: >
        | Layer | Phase 1: {name} | Phase 2: {name} | Phase 3: {name} | Phase 4: {name} | Phase 5: {name} |
        |-------|-----------------|-----------------|-----------------|-----------------|-----------------|
        | **Physical Evidence** | {artifact} | {artifact} | {artifact} | {artifact} | {artifact} |
        | --- LINE OF INTERACTION --- | | | | | |
        | **Customer Actions** | {action} | {action} | {action} | {action} | {action} |
        | --- LINE OF VISIBILITY --- | | | | | |
        | **Frontstage Actions** | {action} | {action} | {action} | {action} | {action} |
        | --- LINE OF INTERNAL INTERACTION --- | | | | | |
        | **Backstage Actions** | {action} | {action} | {action} | {action} | {action} |
        | --- LINE OF IMPLEMENTATION --- | | | | | |
        | **Support Processes** | {system} | {system} | {system} | {system} | {system} |

    - name: "Lines of Interaction"
      required: true
      description: >
        **Line of Interaction** (between Physical Evidence and Customer Actions):
        - Represents the direct interaction between customer and service
        - Every crossing = a moment of truth for the customer experience
        - Key interactions to monitor: {list critical touchpoints}

        **Line of Visibility** (between Customer Actions and Frontstage):
        - Everything above is visible to the customer
        - Everything below is invisible to the customer
        - Critical question: What should customers see vs. not see?
        - Transparency opportunities: {where showing process builds trust}

        **Line of Internal Interaction** (between Frontstage and Backstage):
        - Separates customer-facing staff/systems from internal operations
        - Handoff points between teams often cause delays or errors
        - Key handoffs to monitor: {list critical internal handoffs}

    - name: "Fail Points and Wait Points"
      required: true
      description: >
        **Fail Points (F):**
        Steps where the service is likely to break down.
        | # | Phase | Layer | Fail Point Description | Likelihood | Impact | Mitigation |
        |---|-------|-------|----------------------|-----------|--------|------------|
        | F1 | {phase} | {layer} | {what can go wrong} | {high|medium|low} | {high|medium|low} | {prevention or recovery} |

        **Wait Points (W):**
        Steps where the customer experiences waiting.
        | # | Phase | Layer | Wait Description | Duration | Customer Perception | Improvement |
        |---|-------|-------|-----------------|----------|-------------------|-------------|
        | W1 | {phase} | {layer} | {what causes wait} | {time} | {acceptable|frustrating|abandonment risk} | {how to reduce or manage} |

        **Decision Points (D):**
        Steps where the service branches based on conditions.
        | # | Phase | Condition | Path A | Path B |
        |---|-------|-----------|--------|--------|
        | D1 | {phase} | {if/then} | {happy path} | {exception path} |

    - name: "Emotional Journey"
      required: true
      description: >
        Customer emotional state across the service journey:

        | Phase | Emotion | Trigger | Impact on Experience |
        |-------|---------|---------|---------------------|
        | {phase 1} | {e.g., curious, anxious} | {what causes this feeling} | {positive/negative} |
        | {phase 2} | {emotion} | {trigger} | {impact} |

        **Emotional Arc:**
        ```
        Phase 1    Phase 2    Phase 3    Phase 4    Phase 5
          +2         +1         -1         +2         +3
          :)         :|         :(         :)         :D
        ```
        Scale: -3 (very negative) to +3 (very positive)

        **Critical Emotional Moments:**
        - Highest point: {phase and why}
        - Lowest point: {phase and why}
        - Recovery opportunity: {where negative can become positive}

    - name: "Sequence Diagram"
      required: true
      description: >
        Mermaid sequence diagram showing key interactions:

      format: |
        ```mermaid
        sequenceDiagram
            actor Customer
            participant Frontend
            participant Backend
            participant Support as Support System

            Customer->>Frontend: {action}
            Frontend->>Backend: {process}
            Backend->>Support: {request}
            Support-->>Backend: {response}
            Backend-->>Frontend: {result}
            Frontend-->>Customer: {feedback}

            Note over Customer,Support: Line of Visibility
        ```

    - name: "Opportunity Areas"
      required: true
      description: >
        **Identified Opportunities:**
        | # | Opportunity | Phase | Current Pain | Proposed Improvement | Impact | Effort |
        |---|------------|-------|-------------|---------------------|--------|--------|
        | 1 | {description} | {phase} | {fail/wait/emotion} | {what to change} | {H/M/L} | {H/M/L} |

        **Quick Wins** (high impact, low effort):
        1. {opportunity}

        **Strategic Improvements** (high impact, high effort):
        1. {opportunity}

        **Automation Candidates** (backstage processes that could be automated):
        1. {process and benefit}

    - name: "Next Steps"
      description: >
        - Validate blueprint with frontline staff and operations teams
        - Prioritize fail points for immediate mitigation
        - Design improvements for highest-impact opportunity areas
        - Create detailed user flows for redesigned touchpoints
        - Establish service metrics at each phase for ongoing monitoring
        - Review with engineering to assess support process feasibility
