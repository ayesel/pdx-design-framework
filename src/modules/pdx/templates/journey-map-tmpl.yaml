# Journey Map Template
#
# User journey map with emotional arc, pain points,
# moments of truth, and backstage actions.

template:
  name: Journey Map
  artifact_type: journey-map
  output_file: "_bmad-output/pdx-artifacts/journey-map-{feature-name}.md"

structure:
  header:
    - artifact: "Journey Map"
    - feature: "{feature-name}"
    - persona: "{persona-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"

  sections:
    - name: "Overview"
      description: >
        Which persona is this journey for? What scenario or task?
        What is the scope (end-to-end experience, or specific touchpoint)?
        What research or data informed this map?

    - name: "Journey Phases"
      description: >
        Define the high-level phases of the journey:
        | Phase | Description | Duration | User Goal | Key Touchpoints |
        Example phases: Awareness → Consideration → Onboarding → Core Use → Advocacy

    - name: "Journey Map Table"
      description: >
        Detailed journey map across all phases:
        | Phase | Step | Action | Thinking | Feeling | Touchpoint | Pain Point | Opportunity |
        Use emotional indicators: 😊 Positive, 😐 Neutral, 😤 Frustrated, 😡 Angry, 🤔 Confused, 😌 Relieved

    - name: "Emotional Arc"
      description: >
        Mermaid chart showing emotional trajectory across the journey:
      format: |
        ```mermaid
        xychart-beta
            title "User Emotional Arc"
            x-axis ["Phase 1", "Phase 2", "Phase 3", "Phase 4", "Phase 5"]
            y-axis "Satisfaction" 1 --> 5
            line [4, 3, 2, 4, 5]
        ```

    - name: "Moments of Truth"
      description: >
        Critical moments that disproportionately shape the user's perception:
        | Moment | Phase | What Happens | Why It Matters | Current Experience | Ideal Experience |
        These are make-or-break moments — where users become advocates or abandon.

    - name: "Pain Points Deep Dive"
      description: >
        For each major pain point identified:
        - Description and severity (1-5)
        - User quotes or evidence
        - Root cause (not just symptom)
        - Frequency (how often users encounter this)
        - Workarounds users have developed
        - Recommended solution

    - name: "Backstage Actions"
      description: >
        What happens behind the scenes at each phase:
        | Phase | System Action | Data Flow | Service/API | Potential Failure |
        This connects the user-facing journey to technical architecture.

    - name: "Opportunity Map"
      description: >
        Prioritized opportunities from the journey:
        | Opportunity | Phase | Pain Point Addressed | Impact (H/M/L) | Effort (H/M/L) | Priority |

    - name: "Next Steps"
      description: >
        Typically: user flows for high-impact phases,
        or usability testing to validate pain points with real users.
