# Consistency Check Template
#
# Cross-screen audit for typography, color, spacing, component,
# and interaction pattern consistency.

template:
  name: Consistency Check
  artifact_type: consistency-check
  output_file: "_bmad-output/pdx-artifacts/qa-consistency-check-{scope-name}.md"

structure:
  header:
    - artifact: "Consistency Check"
    - target: "{scope-name}"
    - screens_audited: "{list of screens}"
    - status: "{pass|fail|conditional-pass}"
    - version: "1.0"
    - created: "{date}"
    - author: "Sage (Design QA)"

  sections:
    - name: "Consistency Summary"
      description: >
        | Category | Consistent | Inconsistencies | Severity |
        | Typography scale | | | |
        | Color palette | | | |
        | Spacing rhythm | | | |
        | Component variants | | | |
        | Icon style | | | |
        | Copy tone | | | |
        | Interaction patterns | | | |
        | State treatments | | | |

    - name: "Typography Consistency"
      description: >
        | Pattern | Screen A | Screen B | Screen C | Consistent | Issue |
        Check: heading sizes, body text sizes, label sizes, caption sizes
        used consistently across screens for same semantic purpose.

    - name: "Color Palette Consistency"
      description: >
        | Usage | Screen A | Screen B | Screen C | Consistent | Issue |
        Check: same semantic colors used for same purposes (error=red everywhere),
        background tints consistent, interactive color consistent.

    - name: "Spacing Rhythm Consistency"
      description: >
        | Context | Screen A | Screen B | Screen C | Consistent | Issue |
        Check: section spacing, card padding, form field spacing, list item spacing
        follow same rhythm across screens.

    - name: "Component Variant Consistency"
      description: >
        | Component | Screen A Variant | Screen B Variant | Screen C Variant | Consistent | Issue |
        Check: same component used for same purpose everywhere, variants applied consistently.

    - name: "Icon Style Consistency"
      description: >
        | Context | Screen A | Screen B | Screen C | Consistent | Issue |
        Check: icon set consistent, icon sizes consistent for same context,
        icon + text alignment consistent.

    - name: "Copy Tone Consistency"
      description: >
        | Context | Screen A Copy | Screen B Copy | Tone Match | Issue |
        Check: same action labeled same way everywhere (not "Save" here and "Submit" there),
        error message tone consistent, empty state tone consistent.

    - name: "Interaction Pattern Consistency"
      description: >
        | Pattern | Screen A | Screen B | Screen C | Consistent | Issue |
        Check: same interaction model for same actions, transition styles consistent,
        feedback patterns consistent.

    - name: "State Treatment Consistency"
      description: >
        | State | Screen A Treatment | Screen B Treatment | Consistent | Issue |
        Check: empty, loading, error states look and behave consistently across screens.

    - name: "Issues Table"
      description: >
        | # | Category | Pattern | Screens Affected | Issue | Fix | Effort |

    - name: "Next Steps"
      description: >
        Fix inconsistencies, then run pre-handoff check.
