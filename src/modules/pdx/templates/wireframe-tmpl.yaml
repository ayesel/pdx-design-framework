# Wireframe Template

template:
  name: Low-Fidelity Wireframe
  artifact_type: wireframe
  output_file: "_bmad-output/pdx-artifacts/wireframe-{feature-name}.md"

structure:
  header:
    - artifact: "Low-Fidelity Wireframe"
    - status: "draft"
    - version: "1.0"

  sections:
    - name: "Screen Purpose"
      description: >
        What this screen does, what user task it supports,
        and where it sits in the overall flow.

    - name: "Layout Specification"
      description: >
        ASCII or structured description of the wireframe layout.
        Use this format for each region:
        ```
        ┌─────────────────────────────────┐
        │         HEADER / NAV            │
        ├────────────┬────────────────────┤
        │            │                    │
        │  SIDEBAR   │   MAIN CONTENT     │
        │            │                    │
        │            │                    │
        ├────────────┴────────────────────┤
        │         FOOTER / ACTIONS        │
        └─────────────────────────────────┘
        ```

    - name: "Component Inventory"
      description: >
        Every component on this screen:
        | Component | Type | Content/Label | Behavior | States | Priority |

    - name: "Content Hierarchy"
      description: >
        Information priority from most to least important.
        What does the user need to see FIRST?

    - name: "Interaction Notes"
      description: >
        For each interactive element:
        - Trigger (click, hover, focus, swipe)
        - Response (navigate, expand, submit, toggle)
        - Feedback (animation, message, state change)

    - name: "Responsive Behavior"
      description: >
        How does this screen adapt?
        | Breakpoint | Layout Changes | Hidden Elements | Reordered Elements |

    - name: "State Variations"
      description: >
        Wireframe variations for: empty, loading, error, populated, disabled.
        At minimum describe how each state differs from the default.

    - name: "Accessibility Notes"
      description: >
        Heading hierarchy, landmark regions, tab order, ARIA labels.

    - name: "Copy/Content Needs"
      description: >
        What copy needs to be written? Headlines, labels, error messages,
        empty states, tooltips, CTAs.

    - name: "Next Steps"
      description: >
        Typically: state diagrams for complex components,
        interaction maps for dense areas, or React prototype export.
