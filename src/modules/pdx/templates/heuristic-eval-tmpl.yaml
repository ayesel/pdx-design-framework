# Heuristic Evaluation Template
#
# Structured evaluation against Nielsen's 10 usability heuristics
# with severity ratings and actionable recommendations.

template:
  name: Heuristic Evaluation
  artifact_type: heuristic-eval
  output_file: "_bmad-output/pdx-artifacts/heuristic-eval-{target-name}.md"

structure:
  header:
    - artifact: "Heuristic Evaluation"
    - target: "{target-name}"
    - status: "draft"
    - version: "1.0"
    - created: "{date}"
    - author: "Nova (UX Researcher)"
    - confidence: "{high|medium|low}"

  sections:
    - name: "Executive Summary"
      description: >
        3-5 bullet summary of overall usability health, critical issues found,
        and highest-priority recommendations.

    - name: "Evaluation Scope"
      description: >
        What was evaluated: screens, flows, features. What was excluded and why.
        Evaluator expertise and context.

    - name: "Heuristic Scorecard"
      description: >
        Summary scorecard across all 10 heuristics:
        | # | Heuristic | Score (0-4) | Issue Count | Severity Max | Notes |
        |---|-----------|-------------|-------------|--------------|-------|
        | 1 | Visibility of system status | | | | |
        | 2 | Match between system and real world | | | | |
        | 3 | User control and freedom | | | | |
        | 4 | Consistency and standards | | | | |
        | 5 | Error prevention | | | | |
        | 6 | Recognition rather than recall | | | | |
        | 7 | Flexibility and efficiency of use | | | | |
        | 8 | Aesthetic and minimalist design | | | | |
        | 9 | Help users recognize, diagnose, recover from errors | | | | |
        | 10 | Help and documentation | | | | |

        Severity scale: 0=Not a problem, 1=Cosmetic, 2=Minor, 3=Major, 4=Catastrophic

    - name: "Detailed Findings"
      description: >
        For each heuristic with issues found, document:
        | ID | Heuristic | Location | Issue Description | Severity (0-4) | Evidence/Screenshot | Recommendation |

    - name: "Positive Patterns"
      description: >
        What the product does well. Document strong usability patterns
        worth preserving or extending to other areas.

    - name: "Accessibility Quick Check"
      description: >
        Lightweight accessibility observations made during evaluation:
        - Color contrast issues spotted
        - Keyboard navigation problems
        - Missing alt text or labels
        - Focus management concerns
        Note: This is not a full WCAG audit — recommend /accessibility-audit for comprehensive coverage.

    - name: "Top 5 Recommendations"
      description: >
        Prioritized list of the 5 most impactful fixes:
        | Priority | Issue | Severity | Effort (S/M/L) | Impact | Recommendation |

    - name: "Methodology Notes"
      description: >
        Evaluator count, time spent, heuristic set used, devices/browsers tested,
        and any limitations of the evaluation.

    - name: "Next Steps"
      description: >
        Typically: usability testing to validate findings with real users,
        or specific design improvements for critical issues.
