# PDX Override for BMAD's Built-in UX Designer (Sally)
# When PDX is installed, Sally is replaced by PDX agents.
# This override redirects anyone who accidentally loads Sally.

override:
  target_agent: bmad-ux-designer
  module: pdx

  startup_message: |
    PDX is installed in this project. UX design is handled by PDX agents
    (Nova, Kai, Echo, Sage, Relay, Lux). Load @pdx-orchestrator to run a
    design sprint, or load individual agents directly. Sally is not needed.

    Quick start:
    - @pdx-orchestrator — Full design-to-sprint pipeline
    - @ux-researcher — Nova for research
    - @interaction-designer — Kai for flows and wireframes
    - @visual-designer — Lux for visual polish
    - @content-strategist — Echo for microcopy
    - @design-qa — Sage for quality gates
    - @design-ops — Relay for handoff and stories

  menu_overrides:
    - original_command: "create-wireframe"
      redirect_to: "pdx-interaction-designer"
      message: "Wireframes are handled by Kai (Interaction Designer) in PDX. Load @pdx-interaction-designer and use /wireframe."

    - original_command: "create-ux-design"
      redirect_to: "pdx-orchestrator"
      message: "UX design is handled by the PDX orchestrator. Load @pdx-orchestrator and use /design-sprint for the full pipeline."

    - original_command: "create-user-flow"
      redirect_to: "pdx-interaction-designer"
      message: "User flows are handled by Kai (Interaction Designer) in PDX. Load @pdx-interaction-designer and use /user-flow."

    - original_command: "create-persona"
      redirect_to: "pdx-ux-researcher"
      message: "Personas are handled by Nova (UX Researcher) in PDX. Load @pdx-ux-researcher and use /persona-gen."

    - original_command: "create-journey-map"
      redirect_to: "pdx-ux-researcher"
      message: "Journey maps are handled by Nova (UX Researcher) in PDX. Load @pdx-ux-researcher and use /journey-map."
